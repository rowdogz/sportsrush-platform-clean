name: Deploy — Dev

# Automatically deploys to the dev environment after every merge to main.
# API deploy and migration steps are added in PR-04 and PR-05.

on:
  push:
    branches: [main]

concurrency:
  group: deploy-dev
  cancel-in-progress: false  # Never cancel a deploy mid-flight

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    environment: dev
    # This job is a placeholder. Steps are added incrementally:
    # PR-04 adds: wrangler deploy --env dev
    # PR-05 adds: wrangler d1 migrations apply --env dev (before deploy)
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy placeholder
        run: echo "Dev deployment steps will be added in PR-04 and PR-05."
